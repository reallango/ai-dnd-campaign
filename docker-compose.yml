version: '3.8'

services:
  ai-dnd-campaign:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-dnd-campaign:latest
    container_name: ai-dnd-campaign
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - AI_PROVIDER=ollama
      - AI_BASE_URL=http://host.docker.internal:11434
      - AI_MODEL=llama3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
