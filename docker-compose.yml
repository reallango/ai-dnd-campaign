version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-dnd-campaign:latest
    container_name: ai-dnd-campaign
    ports:
      - "3900:3000"
    volumes:
      - db_data:/app/data
    environment:
      - NODE_ENV=production
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: always

volumes:
  db_data:
