version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: "{{ .Env.GIT_COMMIT }}"
    image: ai-dnd-campaign:latest
    container_name: ai-dnd-campaign
    ports:
      - "3900:3000"
    volumes:
      - db_data:/app/data
    environment:
      - NODE_ENV=production
      - GIT_COMMIT=${GITHUB_COMMIT:-docker}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORTAINER_API_URL=${PORTAINER_API_URL:-""}
      - PORTAINER_API_TOKEN=${PORTAINER_API_TOKEN:-""}
      - PORTAINER_STACK_NAME=${PORTAINER_STACK_NAME:-""}
      - PORTAINER_STACK_ID=${PORTAINER_STACK_ID:-""}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

volumes:
  db_data:
