version: '3.8'

services:
  ai-dnd-campaign:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-dnd-campaign:latest
    container_name: ai-dnd-campaign
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
