name: Update Build Hash

on:
  push:
    branches:
      - main

jobs:
  update-hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write commit hash
        run: echo "GIT_COMMIT=${GITHUB_SHA::7}" > .env.build

      - name: Build Docker image with commit hash
        run: docker build \
          --build-arg GIT_COMMIT=${GITHUB_SHA::7} \
          -t reallango/ai-dnd-campaign:latest .

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push reallango/ai-dnd-campaign:latest

      - name: Trigger Portainer redeploy
        run: |
          curl -X POST \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "https://your-portainer-url/api/stacks/<STACK_ID>/webhooks/<WEBHOOK_ID>"

      - name: Commit and push updated hash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .env.build
          git commit -m "Update build hash to ${GITHUB_SHA::7}" || echo "No changes"
          git push