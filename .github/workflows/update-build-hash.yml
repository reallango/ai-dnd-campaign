name: Update Build Hash

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous commit hash
        id: prev
        run: |
          PREV_SHA=$(git rev-parse --short HEAD^)
          echo "prev=$PREV_SHA" >> $GITHUB_OUTPUT

      - name: Write commit hash
        run: echo "GIT_COMMIT=${{ steps.prev.outputs.prev }}" > .env.build

      - name: Commit and push updated hash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .env.build
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update build hash to ${{ steps.prev.outputs.prev }}"
            git push
          fi
